name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} · node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # 18.3.0 is the documented engine floor; 18.x/20.x/22.x are the supported line.
        node: ["18.3.0", "18.x", "20.x", "22.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  package-verify:
    name: package-verify (ubuntu · node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run build
      # Inspects the real packed tarball: required files present, no forbidden leaks.
      - run: npm run verify-pack

  # Installs the packed tarball into a throwaway repo and drives the real hook
  # lifecycle. Runs on both POSIX and Windows because the state layer does
  # path handling and atomic renames that differ meaningfully between them.
  dogfood:
    name: dogfood (${{ matrix.os }} · node 22)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run dogfood

  # Single stable context for branch protection: succeeds only when the whole
  # test matrix, package verification, and dogfood succeeded. Rulesets require
  # "ci-gate" instead of individual matrix labels that break on any rename.
  ci-gate:
    name: ci-gate
    if: ${{ always() }}
    needs:
      - test
      - package-verify
      - dogfood
    runs-on: ubuntu-latest
    steps:
      - name: Verify required CI jobs
        env:
          TEST_RESULT: ${{ needs.test.result }}
          PACKAGE_RESULT: ${{ needs.package-verify.result }}
          DOGFOOD_RESULT: ${{ needs.dogfood.result }}
        run: |
          echo "test: $TEST_RESULT"
          echo "package-verify: $PACKAGE_RESULT"
          echo "dogfood: $DOGFOOD_RESULT"

          if [ "$TEST_RESULT" != "success" ] ||
             [ "$PACKAGE_RESULT" != "success" ] ||
             [ "$DOGFOOD_RESULT" != "success" ]; then
            echo "One or more required CI jobs did not succeed."
            exit 1
          fi
